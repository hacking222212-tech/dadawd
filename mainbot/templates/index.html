<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bot Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111214; color:#dcddde; font-family:'Segoe UI',sans-serif; padding:30px; }
h1 { font-size:24px; color:#fff; margin-bottom:4px; }
.sub { color:#72767d; font-size:13px; margin-bottom:30px; }
h2 { font-size:18px; color:#fff; margin:30px 0 14px; }
.search { width:100%; max-width:400px; padding:8px 16px; border-radius:20px; border:1px solid #3f4147; background:#1e1f22; color:#dcddde; font-size:13px; outline:none; margin-bottom:16px; }
.search:focus { border-color:#5865F2; }
.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.fb { padding:5px 14px; border-radius:20px; border:1px solid #3f4147; background:#1e1f22; color:#b5bac1; cursor:pointer; font-size:12px; }
.fb.active { background:#5865F2; border-color:#5865F2; color:#fff; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.card { background:#1e1f22; border-radius:10px; padding:16px; border-left:4px solid var(--c); }
.badge { font-size:11px; padding:2px 10px; border-radius:20px; background:var(--c); color:#fff; font-weight:600; }
.cid { font-family:monospace; font-size:11px; color:#72767d; margin-top:6px; word-break:break-all; }
.cuser { font-size:13px; color:#b5bac1; margin-top:8px; } .cuser span { color:#fff; }
.cdate { font-size:12px; color:#72767d; margin-top:3px; }
.actions { display:flex; gap:8px; margin-top:12px; }
.btn-v { flex:1; text-align:center; padding:6px; border-radius:6px; background:#2b2d31; color:#dcddde; text-decoration:none; font-size:13px; }
.btn-v:hover { background:#3f4147; }
.btn-d { padding:6px 12px; border-radius:6px; background:#ed4245; color:#fff; text-decoration:none; font-size:13px; }
.btn-d:hover { background:#c03537; }
table { width:100%; border-collapse:collapse; background:#1e1f22; border-radius:10px; overflow:hidden; }
th { background:#0f3460; padding:12px 16px; text-align:left; color:#5865F2; font-size:12px; text-transform:uppercase; }
td { padding:12px 16px; border-bottom:1px solid #111214; font-size:13px; }
tr:last-child td { border-bottom:none; }
.code { font-family:monospace; background:#0f3460; padding:3px 8px; border-radius:4px; color:#7289da; }
.empty { text-align:center; padding:60px; color:#4e5058; }
</style>
</head>
<body>
<h1>Bot Panel</h1>
<p class="sub">Tickets, Codes und mehr auf einen Blick</p>

<h2>Tickets <span style="background:#5865F2;color:#fff;padding:2px 10px;border-radius:20px;font-size:12px;margin-left:6px;">{{ tickets|length }}</span></h2>
<input class="search" type="text" placeholder="ID oder Nutzer suchen..." oninput="searchTickets(this.value)">
<div class="filters">
  <button class="fb active" onclick="filterTickets('all',this)">Alle</button>
  <button class="fb" onclick="filterTickets('kauf',this)">Bestellungen</button>
  <button class="fb" onclick="filterTickets('support',this)">Support</button>
  <button class="fb" onclick="filterTickets('bewerbung',this)">Bewerbungen</button>
  <button class="fb" onclick="filterTickets('report',this)">Meldungen</button>
  <button class="fb" onclick="filterTickets('partner',this)">Partner</button>
</div>
{% if tickets %}
<div class="grid" id="tgrid">
  {% for t in tickets %}
  <div class="card" style="--c:{{ t.color }}" data-typ="{{ t.typ }}" data-id="{{ t.id }}" data-user="{{ t.user }}">
    <span class="badge">{{ t.label }}</span>
    <div class="cid">{{ t.id }}</div>
    <div class="cuser">Nutzer: <span>{{ t.user }}</span></div>
    <div class="cdate">{{ t.erstellt }}</div>
    <div class="actions">
      <a href="/ticket/{{ t.id }}" class="btn-v">📄 Verlauf</a>
      <a href="/delete_ticket/{{ t.id }}" class="btn-d" onclick="return confirm('Löschen?')">✕</a>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}<div class="empty">Noch keine Tickets</div>{% endif %}

<script>
function filterTickets(typ, btn) {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tgrid')?.querySelectorAll('.card').forEach(c => {
    c.style.display = (typ==='all' || c.dataset.typ===typ) ? '' : 'none';
  });
}
function searchTickets(val) {
  val = val.toLowerCase();
  document.getElementById('tgrid')?.querySelectorAll('.card').forEach(c => {
    c.style.display = (!val || c.dataset.id.toLowerCase().includes(val) || c.dataset.user.toLowerCase().includes(val)) ? '' : 'none';
  });
}
</script>
</body>
</html>
